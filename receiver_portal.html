<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee26 - Receive Shipment</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, get, query, orderByChild, equalTo, update } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
        
        // Use the exact same Firebase config from your main app
        const firebaseConfig = {
            apiKey: "AIzaSyAMZHYef6CXhkfJNdewMQ8M2gifGgS07k",
            authDomain: "bee26cargoservices-2651f.firebaseapp.com",
            projectId: "bee26cargoservices-2651f",
            storageBucket: "bee26cargoservices-2651f.appspot.com", 
            messagingSenderId: "508829616627",
            appId: "1:508829616627:web:062d3f033cad60a9089686",
            measurementId: "G-YSB8DJ5PE6",
            databaseURL: "https://bee26cargoservices-2651f-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Expose to window for our script to use
        window.db = db;
        window.dbRef = ref;
        window.dbGet = get;
        window.dbQuery = query;
        window.dbOrderByChild = orderByChild;
        window.dbEqualTo = equalTo;
        window.dbUpdate = update;
    </script>

    <style>
        /* Reusing your beautiful Bee26 color palette */
        :root {
            --blue: #007aff;
            --blue-light: #e6f2ff;
            --green: #28a745;
            --grey-light: #f0f0f5;
            --grey-mid: #e5e5ea;
            --text-primary: #1c1c1e;
            --text-secondary: #636366;
            --bg-white: #ffffff;
            --border-radius: 12px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--grey-light);
            color: var(--text-primary);
            margin: 0;
            padding: 10px; /* Tighter padding for mobile */
            display: flex;
            justify-content: center;
            font-size: 14px; /* Instagram base font size */
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background-color: var(--bg-white);
            border-radius: var(--border-radius);
            padding: 15px; /* Tighter padding */
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }

        h1, h2 { margin-top: 0; color: var(--blue); font-size: 1.2rem; }
        h3 { margin-top: 0; font-size: 1rem; color: var(--text-primary); }
        p { color: var(--text-secondary); line-height: 1.4; font-size: 0.85rem; margin-top: 5px; margin-bottom: 5px; }
        
        .shipment-info-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 4px 10px;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .shipment-info-grid strong { color: var(--text-secondary); text-align: right; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }

        .input-group label { font-weight: 600; font-size: 0.85rem; }
        .input-group input {
            padding: 10px;
            font-size: 0.9rem;
            border: 1px solid var(--grey-mid);
            border-radius: 8px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-small { width: auto; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }
        
        .btn-primary { background-color: var(--blue); color: white; }
        .btn-success { background-color: var(--green); color: white; }
        .btn-outline { background-color: transparent; border: 1px solid var(--blue); color: var(--blue); margin-bottom: 0.5rem;}
        
        /* Mobile friendly item cards instead of tables */
        .item-card {
            border: 1px solid var(--grey-mid);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #fafafa;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #eee;
            padding-bottom: 6px;
        }

        /* Adjusted fonts to mimic Instagram/modern mobile app scale */
        .item-title { font-weight: 600; font-size: 0.9rem; line-height: 1.2; color: #262626; }
        .item-expected { color: #737373; font-size: 0.75rem; margin-top: 3px; line-height: 1.3;}

        .item-action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            padding: 4px 0 0 0;
            border-radius: 8px;
        }

        .item-action label { font-weight: 600; color: var(--blue); font-size: 0.8rem; }
        .item-action select {
            width: 70px;
            padding: 6px;
            text-align: center;
            font-weight: bold;
            border: 1px solid var(--blue);
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .category-header {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            margin: 15px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .header-red { background-color: #fff0f0; color: #ff3b30; border: 1px solid #ff3b30; }
        .header-orange { background-color: #fff9f0; color: #ff9500; border: 1px solid #ff9500; }
        .header-green { background-color: #e9f7eb; color: #28a745; border: 1px solid #28a745; }

        #shipment-details { display: none; } /* Hidden until selected */
        
        .invoice-list-item {
            padding: 15px;
            border: 1px solid var(--grey-mid);
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fafafa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .invoice-list-item:hover {
            border-color: var(--blue);
            background: var(--blue-light);
            transform: translateY(-2px);
        }
        
        .invoice-status {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* Image Modal Styles */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="https://raw.githubusercontent.com/crickerr26/bee26cargomanager/main/BEE26.png" alt="Bee26 Cargo Logo" style="height: 50px;">
        </div>

        <div class="card" id="invoice-list-section">
            <h2 style="margin-bottom: 5px;">All Shipments</h2>
            <p style="margin-top: 0;">Click on an invoice below to view the packing list and mark items as received.</p>
            <div id="loading-invoices" style="text-align: center; padding: 20px; color: var(--text-secondary);">Loading invoices...</div>
            
            <h3 style="margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--orange);">Pending Receiving</h3>
            <div id="invoices-pending-container"></div>

            <div id="delivered-section-wrapper" style="display: none;">
                <h3 style="margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--green); display: flex; justify-content: space-between; align-items: center;">
                    Fully Delivered
                    <button id="btn-show-delivered" class="btn btn-outline btn-small" style="margin: 0; padding: 4px 10px;">Show Completed</button>
                </h3>
                <div id="invoices-delivered-container" style="display: none;"></div>
                <div id="pagination-controls" style="display: none; justify-content: space-between; margin-top: 15px; align-items: center;">
                    <button id="btn-prev-page" class="btn btn-outline btn-small" style="margin: 0; padding: 6px 12px;">&larr; Prev</button>
                    <span id="page-indicator" style="font-size: 0.85rem; font-weight: bold; color: var(--text-secondary);">Page 1</span>
                    <button id="btn-next-page" class="btn btn-outline btn-small" style="margin: 0; padding: 6px 12px;">Next &rarr;</button>
                </div>
            </div>
        </div>

        <div id="imageModal" class="image-modal">
            <span class="image-modal-close" id="closeImageModal">&times;</span>
            <img id="enlargedImage" src="">
        </div>

        <div id="shipment-details">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-outline btn-small" id="btn-back" style="margin: 0;">← Back</button>
                <h2 style="margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: center;">Invoice: <span id="display-invoice"></span></h2>
                <button class="btn btn-primary btn-small" id="btn-download-pdf" style="margin: 0; background-color: #5856d6; color: white; border: none;">📄 PDF Report</button>
            </div>
            
            <div class="card" style="padding: 12px;">
                <h2 style="font-size: 0.95rem; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Shipment Info</h2>
                <div class="shipment-info-grid">
                    <strong>Sender:</strong> <span id="display-sender"></span>
                    <strong>Receiver:</strong> <span id="display-receiver"></span>
                    <strong>Phone:</strong> <span id="display-receiver-phone"></span>
                    <strong>Address:</strong> <span id="display-receiver-address"></span>
                    <strong>Packages:</strong> <span id="display-packages"></span>
                </div>
            </div>

            <div class="card" style="padding: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 style="margin: 0; font-size: 0.95rem;">Packing List</h2>
                    <button class="btn btn-outline btn-small" id="btn-receive-all" style="margin: 0; padding: 4px 8px; font-size: 0.75rem;">✓ Mark All Rcvd</button>
                </div>
                
                <div id="items-not-received-container"></div>
                <div id="items-missing-container"></div>
                <div id="items-received-container"></div>

                <button class="btn btn-success" id="btn-submit-receipt" style="margin-top: 15px;">Submit Receiving Report</button>
            </div>
        </div>

    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', () => {
            // Use an interval instead of a fixed 500ms timeout to wait for Firebase to load.
            // This reliably fixes the connection drop error on slower mobile networks.
            const firebaseLoader = setInterval(() => {
                const db = window.db;
                if (!db || !window.dbGet || !window.dbRef) {
                    return; // Wait patiently until it's actually ready
                }
                clearInterval(firebaseLoader);

                let currentBoxKey = null;
                let currentBoxItems = [];

                // DOM Elements
                const invoiceListSection = document.getElementById('invoice-list-section');
                const invoicesPendingContainer = document.getElementById('invoices-pending-container');
                const invoicesDeliveredContainer = document.getElementById('invoices-delivered-container');
                const loadingInvoices = document.getElementById('loading-invoices');
                const detailsSection = document.getElementById('shipment-details');
                const btnBack = document.getElementById('btn-back');
                
                // New DOM Elements for Delivered Pagination
                const deliveredSectionWrapper = document.getElementById('delivered-section-wrapper');
                const btnShowDelivered = document.getElementById('btn-show-delivered');
                const paginationControls = document.getElementById('pagination-controls');
                const btnPrevPage = document.getElementById('btn-prev-page');
                const btnNextPage = document.getElementById('btn-next-page');
                const pageIndicator = document.getElementById('page-indicator');

                let allShipments = {};
                let allBoxes = {};
                let deliveredBoxesArray = [];
                let currentDeliveredPage = 1;
                const deliveredItemsPerPage = 5;

                // Helper to render delivered items grouped
                function renderDeliveredItems() {
                    invoicesDeliveredContainer.innerHTML = '';
                    
                    if (deliveredBoxesArray.length === 0) {
                        invoicesDeliveredContainer.innerHTML = '<p style="text-align:center; font-size:0.85rem;">No completed boxes.</p>';
                        paginationControls.style.display = 'none';
                        return;
                    }

                    const totalPages = Math.ceil(deliveredBoxesArray.length / deliveredItemsPerPage);
                    if (currentDeliveredPage > totalPages) currentDeliveredPage = totalPages;
                    if (currentDeliveredPage < 1) currentDeliveredPage = 1;

                    const startIndex = (currentDeliveredPage - 1) * deliveredItemsPerPage;
                    const endIndex = startIndex + deliveredItemsPerPage;
                    const itemsToDisplay = deliveredBoxesArray.slice(startIndex, endIndex);

                    itemsToDisplay.forEach(box => {
                        const itemHtml = `
                            <div class="invoice-list-item" onclick="openBox('${box.key}')">
                                <div>
                                    <strong style="font-size: 1.1rem; color: var(--green);">✅ Batch: ${box.batchNo} | ${box.boxNo}</strong>
                                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">Total Items in Box: ${box.items.length}</div>
                                </div>
                                <div class="invoice-status" style="background: var(--green); color: white;">
                                    Delivered
                                </div>
                            </div>
                        `;
                        invoicesDeliveredContainer.insertAdjacentHTML('beforeend', itemHtml);
                    });
                    
                    // Handle Pagination Controls
                    if (totalPages > 1) {
                        paginationControls.style.display = 'flex';
                        pageIndicator.textContent = `Page ${currentDeliveredPage} of ${totalPages}`;
                        btnPrevPage.disabled = currentDeliveredPage === 1;
                        btnNextPage.disabled = currentDeliveredPage === totalPages;
                        
                        btnPrevPage.style.opacity = currentDeliveredPage === 1 ? '0.5' : '1';
                        btnNextPage.style.opacity = currentDeliveredPage === totalPages ? '0.5' : '1';
                    } else {
                        paginationControls.style.display = 'none';
                    }
                }

                // Button Event Listeners for completed deliveries
                btnShowDelivered.addEventListener('click', () => {
                    if (invoicesDeliveredContainer.style.display === 'none') {
                        invoicesDeliveredContainer.style.display = 'block';
                        btnShowDelivered.textContent = 'Hide Completed';
                        currentDeliveredPage = 1; // reset to page 1 on open
                        renderDeliveredItems();
                    } else {
                        invoicesDeliveredContainer.style.display = 'none';
                        paginationControls.style.display = 'none';
                        btnShowDelivered.textContent = 'Show Completed';
                    }
                });

                btnPrevPage.addEventListener('click', () => {
                    if (currentDeliveredPage > 1) {
                        currentDeliveredPage--;
                        renderDeliveredItems();
                    }
                });

                btnNextPage.addEventListener('click', () => {
                    const totalPages = Math.ceil(deliveredBoxesArray.length / deliveredItemsPerPage);
                    if (currentDeliveredPage < totalPages) {
                        currentDeliveredPage++;
                        renderDeliveredItems();
                    }
                });

                // --- 1. LOAD ALL BOXES ---
                async function loadAllInvoices() {
                    try {
                        loadingInvoices.style.display = 'block';
                        const shipmentsRef = window.dbRef(db, 'shipments');
                        const snapshot = await window.dbGet(shipmentsRef);
                        
                        loadingInvoices.style.display = 'none';
                        invoicesPendingContainer.innerHTML = '';
                        invoicesDeliveredContainer.innerHTML = '';
                        
                        // Reset states
                        allBoxes = {};
                        deliveredBoxesArray = [];
                        deliveredSectionWrapper.style.display = 'none';
                        paginationControls.style.display = 'none';
                        btnShowDelivered.textContent = 'Show Completed';
                        invoicesDeliveredContainer.style.display = 'none';

                        if (snapshot.exists()) {
                            allShipments = snapshot.val();

                            // Aggregate Items into physical Boxes
                            Object.keys(allShipments).forEach(shipmentId => {
                                const shipment = allShipments[shipmentId];
                                const batchNo = shipment.batchNo || 'Unassigned Batch';
                                
                                if (shipment.items) {
                                    shipment.items.forEach((item, index) => {
                                        if (!item) return;
                                        const boxNo = item.boxNo || 'Unassigned Box';
                                        const boxKey = `${batchNo}|||${boxNo}`;
                                        
                                        if (!allBoxes[boxKey]) {
                                            allBoxes[boxKey] = {
                                                batchNo: batchNo,
                                                boxNo: boxNo,
                                                key: boxKey,
                                                items: [],
                                                totalExpected: 0,
                                                totalReceived: 0
                                            };
                                        }
                                        
                                        let expected = parseFloat(item.qty) || 0;
                                        let received = item.receivedQty !== undefined ? parseFloat(item.receivedQty) : 0;
                                        
                                        // Handle backward compatibility: If overall shipment is marked Delivered, mark items as fully received
                                        if (shipment.deliveryStatus === 'Delivered' && received === 0 && expected > 0) {
                                            received = expected;
                                            item.receivedQty = received; // Update item so the UI shows it as received when the box is opened
                                        }
                                        
                                        allBoxes[boxKey].items.push({
                                            shipmentId: shipmentId,
                                            itemIndex: index,
                                            data: item,
                                            invoiceNumber: shipment.invoiceNumber,
                                            senderName: shipment.senderName || item.senderName || 'Unknown',
                                            receiverName: shipment.receiverName || 'Unknown'
                                        });
                                        
                                        allBoxes[boxKey].totalExpected += expected;
                                        allBoxes[boxKey].totalReceived += received;
                                    });
                                }
                            });

                            let pendingCount = 0;
                            const sortedBoxKeys = Object.keys(allBoxes).sort();

                            sortedBoxKeys.forEach(boxKey => {
                                const box = allBoxes[boxKey];
                                const isDelivered = box.totalReceived >= box.totalExpected && box.totalExpected > 0;
                                
                                if (isDelivered) {
                                    deliveredBoxesArray.push(box);
                                } else {
                                    const statusBg = '#fff9f0'; 
                                    const statusColor = '#ff9500';
                                    const itemHtml = `
                                        <div class="invoice-list-item" onclick="openBox('${boxKey}')">
                                            <div>
                                                <strong style="font-size: 1.1rem; color: var(--purple);">📦 Batch: ${box.batchNo} | ${box.boxNo}</strong>
                                                <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">Total Items in Box: ${box.items.length}</div>
                                            </div>
                                            <div class="invoice-status" style="background: ${statusBg}; color: ${statusColor};">
                                                Pending
                                            </div>
                                        </div>
                                    `;
                                    invoicesPendingContainer.insertAdjacentHTML('beforeend', itemHtml);
                                    pendingCount++;
                                }
                            });
                            
                            if (pendingCount === 0) invoicesPendingContainer.innerHTML = '<p style="text-align:center; font-size:0.85rem;">No pending boxes.</p>';
                            
                            if (deliveredBoxesArray.length > 0) {
                                deliveredSectionWrapper.style.display = 'block';
                            }

                        } else {
                            invoicesPendingContainer.innerHTML = '<p style="text-align:center;">No shipments found.</p>';
                        }
                    } catch (error) {
                        console.error("Firebase fetch error:", error);
                        loadingInvoices.style.display = 'block';
                        loadingInvoices.innerHTML = '<span style="color: red; font-weight: bold;">Network timeout. Retrying connection...</span>';
                        setTimeout(loadAllInvoices, 3000);
                    }
                }

                // Call the function immediately to load data
                loadAllInvoices();

                // --- 2. OPEN BOX DETAILS ---
                window.openBox = function(boxKey) {
                    const box = allBoxes[boxKey];
                    if (!box) return;

                    currentBoxKey = boxKey;
                    currentBoxItems = box.items; // Contains array of items from multiple shipments
                    
                    // Extract unique senders and receivers
                    const senders = [...new Set(currentBoxItems.map(i => i.senderName))];
                    const receivers = [...new Set(currentBoxItems.map(i => i.receiverName))];

                    // Populate UI
                    document.getElementById('display-invoice').textContent = `Batch: ${box.batchNo} | ${box.boxNo}`;
                    document.getElementById('display-sender').textContent = senders.length > 1 ? 'Multiple Senders' : (senders[0] || 'N/A');
                    document.getElementById('display-receiver').textContent = receivers.length > 1 ? 'Multiple Receivers' : (receivers[0] || 'N/A');
                    document.getElementById('display-receiver-phone').textContent = '--';
                    document.getElementById('display-receiver-address').textContent = '--';
                    document.getElementById('display-packages').textContent = `${currentBoxItems.length} Items`;
                    
                    renderItems();
                    
                    invoiceListSection.style.display = "none";
                    detailsSection.style.display = "block";
                };

                // --- BACK BUTTON ---
                btnBack.addEventListener('click', () => {
                    detailsSection.style.display = "none";
                    invoiceListSection.style.display = "block";
                    loadAllInvoices(); // Refresh the list to catch any updates
                });

                // --- MODAL LOGIC FOR IMAGES ---
                const imageModal = document.getElementById('imageModal');
                const enlargedImage = document.getElementById('enlargedImage');
                const closeImageModal = document.getElementById('closeImageModal');

                closeImageModal.addEventListener('click', () => {
                    imageModal.style.display = "none";
                });
                
                window.openImageModal = function(src) {
                    enlargedImage.src = src;
                    imageModal.style.display = "flex";
                };

                // --- QTY CHANGE HANDLER (Update Model & Re-render) ---
                window.handleQtyChange = function(elem, index) {
                    const val = parseInt(elem.value);
                    if (currentBoxItems[index]) {
                        currentBoxItems[index].data.receivedQty = val;
                        renderItems(); // Re-render to move to correct category instantly
                    }
                };

                // --- 2. RENDER ITEMS (Render all items for this Box) ---
                function renderItems() {
                    const notReceivedContainer = document.getElementById('items-not-received-container');
                    const missingContainer = document.getElementById('items-missing-container');
                    const receivedContainer = document.getElementById('items-received-container');
                    
                    notReceivedContainer.innerHTML = '';
                    missingContainer.innerHTML = '';
                    receivedContainer.innerHTML = '';

                    let notReceivedHtml = '';
                    let missingHtml = '';
                    let receivedHtml = '';
                    let notReceivedCount = 0;
                    let missingCount = 0;
                    let receivedCount = 0;

                    if (currentBoxItems.length === 0) {
                        notReceivedContainer.innerHTML = '<p>No items found in this box.</p>';
                        return;
                    }

                    currentBoxItems.forEach((boxItem, index) => {
                        const item = boxItem.data;
                        const expectedQty = parseFloat(item.qty) || 0;
                        
                        // Default to 0 if undefined
                        const receivedQty = item.receivedQty !== undefined ? parseFloat(item.receivedQty) : 0;

                        // Create select dropdown options
                        let optionsHtml = '';
                        for (let i = 0; i <= expectedQty; i++) {
                            optionsHtml += `<option value="${i}" ${i === receivedQty ? 'selected' : ''}>${i}</option>`;
                        }

                        // Determine styles based on receiving status
                        let cardStyle = "";
                        let labelText = "";
                        let labelStyle = "";

                        if (receivedQty === 0) {
                            cardStyle = "border-color: #ff3b30; background-color: #fff0f0;";
                            labelText = "Item Not Received:";
                            labelStyle = "color: #ff3b30;";
                        } else if (receivedQty < expectedQty) {
                            const missing = expectedQty - receivedQty;
                            cardStyle = "border-color: #ff9500; background-color: #fff9f0;";
                            labelText = `${missing} missing:`;
                            labelStyle = "color: #ff9500;";
                        } else {
                            cardStyle = "border-color: #28a745; background-color: #e9f7eb;";
                            labelText = "Fully Received:";
                            labelStyle = "color: #28a745;";
                        }

                        const itemHtml = `
                            <div class="item-card" id="item-card-${index}" style="${cardStyle}">
                                <div class="item-header">
                                    <div style="flex-grow: 1; padding-right: 10px;">
                                        <div class="item-title">#${index + 1} - ${item.desc || 'Unknown Item'}</div>
                                        <div class="item-expected">
                                            <strong>Invoice:</strong> <span style="color: var(--blue); font-weight: 600;">${boxItem.invoiceNumber}</span> <br>
                                            <strong>Sender:</strong> ${boxItem.senderName} <br>
                                            <strong>BC:</strong> ${item.barcode || '--'} | <strong>Br:</strong> ${item.brand || '--'} <br>
                                            <strong>Expected Qty:</strong> ${expectedQty}
                                        </div>
                                    </div>
                                    ${item.image ? `<img src="${item.image}" onclick="window.openImageModal('${item.image}')" style="width: 55px; height: 55px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 1px solid #ddd;">` : ''}
                                </div>
                                <div class="item-action">
                                    <label id="item-label-${index}" style="${labelStyle}">${labelText}</label>
                                    <select class="qty-input" data-index="${index}" data-expected="${expectedQty}" onchange="window.handleQtyChange(this, ${index})">
                                        ${optionsHtml}
                                    </select>
                                </div>
                            </div>
                        `;

                        // Group them
                        if (receivedQty === 0) {
                            notReceivedHtml += itemHtml;
                            notReceivedCount++;
                        } else if (receivedQty < expectedQty) {
                            missingHtml += itemHtml;
                            missingCount++;
                        } else {
                            receivedHtml += itemHtml;
                            receivedCount++;
                        }
                    });

                    if (notReceivedCount > 0) notReceivedContainer.innerHTML = `<div class="category-header header-red">Not Received (${notReceivedCount})</div>` + notReceivedHtml;
                    if (missingCount > 0) missingContainer.innerHTML = `<div class="category-header header-orange">Partially Received (${missingCount})</div>` + missingHtml;
                    if (receivedCount > 0) receivedContainer.innerHTML = `<div class="category-header header-green">Fully Received (${receivedCount})</div>` + receivedHtml;
                }

                // --- 3. MARK ALL AS RECEIVED ---
                document.getElementById('btn-receive-all').addEventListener('click', () => {
                    currentBoxItems.forEach(boxItem => {
                        if (boxItem && boxItem.data) {
                            boxItem.data.receivedQty = parseFloat(boxItem.data.qty) || 0;
                        }
                    });
                    renderItems(); // Re-render to move all to Fully Received
                });

                // --- 4. CROSS-SHIPMENT SUBMIT TO FIREBASE ---
                document.getElementById('btn-submit-receipt').addEventListener('click', async () => {
                    const submitBtn = document.getElementById('btn-submit-receipt');
                    submitBtn.textContent = "Updating System...";
                    submitBtn.disabled = true;

                    const updates = {};
                    let shipmentsToRecheck = new Set();

                    // Step 1: Update specific items within their parent shipments
                    currentBoxItems.forEach(boxItem => {
                        const received = boxItem.data.receivedQty !== undefined ? parseFloat(boxItem.data.receivedQty) : 0;
                        updates[`shipments/${boxItem.shipmentId}/items/${boxItem.itemIndex}/receivedQty`] = received;
                        shipmentsToRecheck.add(boxItem.shipmentId);
                    });

                    // Step 2: Check if any affected shipment is now fully delivered
                    shipmentsToRecheck.forEach(shipmentId => {
                        const shipment = allShipments[shipmentId];
                        let allFullyReceived = true;

                        shipment.items.forEach((item, index) => {
                            if (!item) return;
                            const expected = parseFloat(item.qty) || 0;
                            let received = 0;

                            // Check if this item is the one we just updated in the UI
                            const updatedBoxItem = currentBoxItems.find(bi => bi.shipmentId === shipmentId && bi.itemIndex === index);
                            if (updatedBoxItem) {
                                received = updatedBoxItem.data.receivedQty !== undefined ? parseFloat(updatedBoxItem.data.receivedQty) : 0;
                            } else {
                                received = item.receivedQty !== undefined ? parseFloat(item.receivedQty) : 0;
                            }

                            if (received < expected) {
                                allFullyReceived = false;
                            }
                        });

                        // Set the overall status of the shipment based on ALL its items
                        updates[`shipments/${shipmentId}/deliveryStatus`] = allFullyReceived ? 'Delivered' : 'Pending';
                    });

                    try {
                        await window.dbUpdate(window.dbRef(db, '/'), updates);
                        
                        alert("Thank you! The box receipt has been logged successfully.");
                        submitBtn.textContent = "Submit Receiving Report";
                        submitBtn.disabled = false;
                        document.getElementById('shipment-details').style.display = "none";
                        document.getElementById('invoice-list-section').style.display = "block";
                        loadAllInvoices();
                    } catch (error) {
                        console.error("Error updating receipt: ", error);
                        alert("Failed to save. Please try again.");
                        submitBtn.textContent = "Submit Receiving Report";
                        submitBtn.disabled = false;
                    }
                });

                // --- 5. DOWNLOAD PDF REPORT (Box Specific) ---
                document.getElementById('btn-download-pdf').addEventListener('click', () => {
                    if (!currentBoxKey || currentBoxItems.length === 0) {
                        alert("No box data available to download.");
                        return;
                    }

                    const { jsPDF } = window.jspdf;
                    if (!jsPDF) {
                        alert("PDF library is still loading. Please try again in a moment.");
                        return;
                    }

                    const doc = new jsPDF('p', 'pt', 'a4');
                    const box = allBoxes[currentBoxKey];
                    
                    // Header
                    doc.setFontSize(18);
                    doc.setTextColor(0, 122, 255); // var(--blue)
                    doc.text("Box Receiving Report", 40, 40);
                    
                    doc.setFontSize(10);
                    doc.setTextColor(100, 100, 100);
                    doc.text(`Generated on: ${new Date().toLocaleString()}`, 40, 55);

                    // Box Info
                    doc.setFontSize(12);
                    doc.setTextColor(0, 0, 0);
                    doc.text("Box Information", 40, 80);
                    
                    doc.setFontSize(10);
                    doc.text(`Batch No: ${box.batchNo}`, 40, 100);
                    doc.text(`Box No: ${box.boxNo}`, 280, 100);
                    doc.text(`Total Items: ${currentBoxItems.length}`, 40, 115);

                    // Items Table
                    const tableHead = [['#', 'Image', 'Item Description', 'Invoice / Sender', 'Expected', 'Received', 'Missing']];
                    const tableBody = [];
                    
                    let totalExpected = 0;
                    let totalReceived = 0;
                    let totalMissing = 0;

                    currentBoxItems.forEach((boxItem, index) => {
                        const item = boxItem.data;
                        const expected = parseFloat(item.qty) || 0;
                        const received = item.receivedQty !== undefined ? parseFloat(item.receivedQty) : 0;
                        const missing = expected - received > 0 ? expected - received : 0;
                        
                        totalExpected += expected;
                        totalReceived += received;
                        totalMissing += missing;

                        const descText = `${item.desc || 'Unknown'}\nBC: ${item.barcode || '--'} | Br: ${item.brand || '--'}`;
                        const senderText = `${boxItem.invoiceNumber}\n${boxItem.senderName}`;

                        tableBody.push([
                            index + 1,
                            { content: '', image: item.image }, 
                            descText,
                            senderText,
                            expected,
                            received,
                            missing
                        ]);
                    });

                    doc.autoTable({
                        startY: 130,
                        head: tableHead,
                        body: tableBody,
                        theme: 'grid',
                        headStyles: { fillColor: [0, 122, 255], textColor: 255, fontStyle: 'bold', halign: 'center' },
                        styles: { fontSize: 8, cellPadding: 4, valign: 'middle', minCellHeight: 40 },
                        columnStyles: {
                            0: { cellWidth: 20, halign: 'center' },
                            1: { cellWidth: 40, halign: 'center' },
                            2: { cellWidth: 'auto' },
                            3: { cellWidth: 90 },
                            4: { cellWidth: 40, halign: 'center' },
                            5: { cellWidth: 40, halign: 'center', fontStyle: 'bold', textColor: [0, 122, 255] },
                            6: { cellWidth: 40, halign: 'center', fontStyle: 'bold', textColor: [255, 59, 48] }
                        },
                        didDrawCell: function(data) {
                            if (data.column.index === 1 && data.cell.section === 'body' && data.cell.raw && data.cell.raw.image) {
                                try {
                                    const imgData = data.cell.raw.image;
                                    const dim = 30; 
                                    const x = data.cell.x + (data.cell.width - dim) / 2;
                                    const y = data.cell.y + (data.cell.height - dim) / 2;
                                    doc.addImage(imgData, 'JPEG', x, y, dim, dim);
                                } catch(err) { }
                            }
                        }
                    });

                    // Summary Totals
                    const finalY = doc.lastAutoTable.finalY + 20;
                    doc.setFontSize(12);
                    doc.setTextColor(0, 0, 0);
                    doc.text("Receiving Summary", 40, finalY);
                    
                    doc.setFontSize(10);
                    doc.text(`Total Expected Items: ${totalExpected}`, 40, finalY + 20);
                    doc.setTextColor(0, 122, 255);
                    doc.text(`Total Received Items: ${totalReceived}`, 40, finalY + 35);
                    doc.setTextColor(255, 59, 48);
                    doc.text(`Total Missing Items: ${totalMissing}`, 40, finalY + 50);

                    doc.save(`Box_Report_${box.batchNo}_${box.boxNo}.pdf`);
                });

            }, 100); // Check every 100ms until Firebase loads properly
        });
    </script>
</body>
</html>
