<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee26 - Receive Shipment</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, get, query, orderByChild, equalTo, update } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
        
        // Use the exact same Firebase config from your main app
        const firebaseConfig = {
            apiKey: "AIzaSyAMZHYef6CXhkfJNdewMQ8M2gifGgS07k",
            authDomain: "bee26cargoservices-2651f.firebaseapp.com",
            projectId: "bee26cargoservices-2651f",
            storageBucket: "bee26cargoservices-2651f.appspot.com", 
            messagingSenderId: "508829616627",
            appId: "1:508829616627:web:062d3f033cad60a9089686",
            measurementId: "G-YSB8DJ5PE6",
            databaseURL: "https://bee26cargoservices-2651f-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Expose to window for our script to use
        window.db = db;
        window.dbRef = ref;
        window.dbGet = get;
        window.dbQuery = query;
        window.dbOrderByChild = orderByChild;
        window.dbEqualTo = equalTo;
        window.dbUpdate = update;
    </script>

    <style>
        /* Reusing your beautiful Bee26 color palette */
        :root {
            --blue: #007aff;
            --blue-light: #e6f2ff;
            --green: #28a745;
            --grey-light: #f0f0f5;
            --grey-mid: #e5e5ea;
            --text-primary: #1c1c1e;
            --text-secondary: #636366;
            --bg-white: #ffffff;
            --border-radius: 12px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--grey-light);
            color: var(--text-primary);
            margin: 0;
            padding: 10px; /* Tighter padding for mobile */
            display: flex;
            justify-content: center;
            font-size: 14px; /* Instagram base font size */
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background-color: var(--bg-white);
            border-radius: var(--border-radius);
            padding: 15px; /* Tighter padding */
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }

        h1, h2 { margin-top: 0; color: var(--blue); font-size: 1.2rem; }
        h3 { margin-top: 0; font-size: 1rem; color: var(--text-primary); }
        p { color: var(--text-secondary); line-height: 1.4; font-size: 0.85rem; margin-top: 5px; margin-bottom: 5px; }
        
        .shipment-info-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 4px 10px;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .shipment-info-grid strong { color: var(--text-secondary); text-align: right; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }

        .input-group label { font-weight: 600; font-size: 0.85rem; }
        .input-group input {
            padding: 10px;
            font-size: 0.9rem;
            border: 1px solid var(--grey-mid);
            border-radius: 8px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-small { width: auto; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }
        
        .btn-primary { background-color: var(--blue); color: white; }
        .btn-success { background-color: var(--green); color: white; }
        .btn-outline { background-color: transparent; border: 1px solid var(--blue); color: var(--blue); margin-bottom: 0.5rem;}
        
        /* Mobile friendly item cards instead of tables */
        .item-card {
            border: 1px solid var(--grey-mid);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #fafafa;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #eee;
            padding-bottom: 6px;
        }

        /* Adjusted fonts to mimic Instagram/modern mobile app scale */
        .item-title { font-weight: 600; font-size: 0.9rem; line-height: 1.2; color: #262626; }
        .item-expected { color: #737373; font-size: 0.75rem; margin-top: 3px; line-height: 1.3;}

        .item-action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            padding: 4px 0 0 0;
            border-radius: 8px;
        }

        .item-action label { font-weight: 600; color: var(--blue); font-size: 0.8rem; }
        .item-action select {
            width: 70px;
            padding: 6px;
            text-align: center;
            font-weight: bold;
            border: 1px solid var(--blue);
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .category-header {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            margin: 15px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .header-red { background-color: #fff0f0; color: #ff3b30; border: 1px solid #ff3b30; }
        .header-orange { background-color: #fff9f0; color: #ff9500; border: 1px solid #ff9500; }
        .header-green { background-color: #e9f7eb; color: #28a745; border: 1px solid #28a745; }

        #shipment-details { display: none; } /* Hidden until selected */
        
        .invoice-list-item {
            padding: 15px;
            border: 1px solid var(--grey-mid);
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fafafa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .invoice-list-item:hover {
            border-color: var(--blue);
            background: var(--blue-light);
            transform: translateY(-2px);
        }
        
        .invoice-status {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* Image Modal Styles */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="https://raw.githubusercontent.com/crickerr26/bee26cargomanager/main/BEE26.png" alt="Bee26 Cargo Logo" style="height: 50px;">
        </div>

        <div class="card" id="invoice-list-section">
            <h2 style="margin-bottom: 5px;">All Shipments</h2>
            <p style="margin-top: 0;">Click on an invoice below to view the packing list and mark items as received.</p>
            <div id="loading-invoices" style="text-align: center; padding: 20px; color: var(--text-secondary);">Loading invoices...</div>
            
            <h3 style="margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--orange);">Pending Receiving</h3>
            <div id="invoices-pending-container"></div>

            <h3 style="margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--green);">Fully Delivered</h3>
            <div id="invoices-delivered-container"></div>
        </div>

        <div id="imageModal" class="image-modal">
            <span class="image-modal-close" id="closeImageModal">&times;</span>
            <img id="enlargedImage" src="">
        </div>

        <div id="shipment-details">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <button class="btn btn-outline btn-small" id="btn-back" style="margin: 0;">← Back</button>
                <h2 style="margin: 0; font-size: 1.1rem;">Invoice: <span id="display-invoice"></span></h2>
            </div>
            
            <div class="card" style="padding: 12px;">
                <h2 style="font-size: 0.95rem; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Shipment Info</h2>
                <div class="shipment-info-grid">
                    <strong>Sender:</strong> <span id="display-sender"></span>
                    <strong>Receiver:</strong> <span id="display-receiver"></span>
                    <strong>Phone:</strong> <span id="display-receiver-phone"></span>
                    <strong>Address:</strong> <span id="display-receiver-address"></span>
                    <strong>Packages:</strong> <span id="display-packages"></span>
                </div>
            </div>

            <div class="card" style="padding: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 style="margin: 0; font-size: 0.95rem;">Packing List</h2>
                    <button class="btn btn-outline btn-small" id="btn-receive-all" style="margin: 0; padding: 4px 8px; font-size: 0.75rem;">✓ Mark All Rcvd</button>
                </div>
                
                <div id="items-not-received-container"></div>
                <div id="items-missing-container"></div>
                <div id="items-received-container"></div>

                <button class="btn btn-success" id="btn-submit-receipt" style="margin-top: 15px;">Submit Receiving Report</button>
            </div>
        </div>

    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', () => {
            // Wait for Firebase to initialize
            setTimeout(() => {
                const db = window.db;
                if (!db) {
                    alert("System loading error. Please refresh the page.");
                    return;
                }

                let currentShipmentId = null;
                let currentItems = [];

                // DOM Elements
                const invoiceListSection = document.getElementById('invoice-list-section');
                const invoicesPendingContainer = document.getElementById('invoices-pending-container');
                const invoicesDeliveredContainer = document.getElementById('invoices-delivered-container');
                const loadingInvoices = document.getElementById('loading-invoices');
                const detailsSection = document.getElementById('shipment-details');
                const btnBack = document.getElementById('btn-back');

                let allShipments = {};

                // --- 1. LOAD ALL INVOICES ---
                async function loadAllInvoices() {
                    try {
                        const shipmentsRef = window.dbRef(db, 'shipments');
                        const snapshot = await window.dbGet(shipmentsRef);
                        
                        loadingInvoices.style.display = 'none';
                        invoicesPendingContainer.innerHTML = '';
                        invoicesDeliveredContainer.innerHTML = '';

                        if (snapshot.exists()) {
                            allShipments = snapshot.val();
                            
                            // Convert to array to sort by newest first
                            const shipmentsArray = Object.keys(allShipments).map(key => ({
                                id: key,
                                ...allShipments[key]
                            })).reverse(); 

                            let pendingCount = 0;
                            let deliveredCount = 0;

                            shipmentsArray.forEach(shipment => {
                                const isDelivered = shipment.deliveryStatus === 'Delivered';
                                const statusBg = isDelivered ? 'var(--green)' : 'var(--orange-light)';
                                const statusColor = isDelivered ? 'white' : 'var(--orange)';
                                
                                const itemHtml = `
                                    <div class="invoice-list-item" onclick="openShipment('${shipment.id}')">
                                        <div>
                                            <strong style="font-size: 1rem;">${shipment.invoiceNumber || 'No Invoice #'}</strong>
                                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">To: ${shipment.receiverName || 'Unknown'}</div>
                                        </div>
                                        <div class="invoice-status" style="background: ${statusBg}; color: ${statusColor};">
                                            ${shipment.deliveryStatus || 'Pending'}
                                        </div>
                                    </div>
                                `;
                                
                                if (isDelivered) {
                                    invoicesDeliveredContainer.insertAdjacentHTML('beforeend', itemHtml);
                                    deliveredCount++;
                                } else {
                                    invoicesPendingContainer.insertAdjacentHTML('beforeend', itemHtml);
                                    pendingCount++;
                                }
                            });
                            
                            if (pendingCount === 0) invoicesPendingContainer.innerHTML = '<p style="text-align:center; font-size:0.85rem;">No pending shipments.</p>';
                            if (deliveredCount === 0) invoicesDeliveredContainer.innerHTML = '<p style="text-align:center; font-size:0.85rem;">No delivered shipments.</p>';

                        } else {
                            invoicesPendingContainer.innerHTML = '<p style="text-align:center;">No shipments found.</p>';
                            invoicesDeliveredContainer.innerHTML = '<p style="text-align:center;">No shipments found.</p>';
                        }
                    } catch (error) {
                        console.error(error);
                        loadingInvoices.innerHTML = '<span style="color: red;">Error loading invoices. Please check your connection.</span>';
                    }
                }

                // Call the function immediately to load data
                loadAllInvoices();

                // --- 2. OPEN SHIPMENT DETAILS ---
                window.openShipment = function(shipmentId) {
                    const shipment = allShipments[shipmentId];
                    if (!shipment) return;

                    currentShipmentId = shipmentId;
                    currentItems = shipment.items || [];
                    
                    // Populate UI
                    document.getElementById('display-invoice').textContent = shipment.invoiceNumber || 'N/A';
                    document.getElementById('display-sender').textContent = shipment.senderName || 'N/A';
                    document.getElementById('display-receiver').textContent = shipment.receiverName || 'N/A';
                    document.getElementById('display-receiver-phone').textContent = shipment.receiverPhone || 'N/A';
                    document.getElementById('display-receiver-address').textContent = shipment.receiverAddress || 'N/A';
                    document.getElementById('display-packages').textContent = shipment.totalPackages || '0';
                    
                    renderItems();
                    
                    invoiceListSection.style.display = "none";
                    detailsSection.style.display = "block";
                };

                // --- BACK BUTTON ---
                btnBack.addEventListener('click', () => {
                    detailsSection.style.display = "none";
                    invoiceListSection.style.display = "block";
                    loadAllInvoices(); // Refresh the list to catch any updates
                });

                // --- MODAL LOGIC FOR IMAGES ---
                const imageModal = document.getElementById('imageModal');
                const enlargedImage = document.getElementById('enlargedImage');
                const closeImageModal = document.getElementById('closeImageModal');

                closeImageModal.addEventListener('click', () => {
                    imageModal.style.display = "none";
                });
                
                window.openImageModal = function(src) {
                    enlargedImage.src = src;
                    imageModal.style.display = "flex";
                };

                // --- QTY CHANGE HANDLER (Update Model & Re-render) ---
                window.handleQtyChange = function(elem, index) {
                    const val = parseInt(elem.value);
                    if (currentItems[index]) {
                        currentItems[index].receivedQty = val;
                        renderItems(); // Re-render to move to correct category instantly
                    }
                };

                // --- 2. RENDER ITEMS (Categorized) ---
                function renderItems() {
                    const notReceivedContainer = document.getElementById('items-not-received-container');
                    const missingContainer = document.getElementById('items-missing-container');
                    const receivedContainer = document.getElementById('items-received-container');
                    
                    notReceivedContainer.innerHTML = '';
                    missingContainer.innerHTML = '';
                    receivedContainer.innerHTML = '';
                    
                    let notReceivedHtml = '';
                    let missingHtml = '';
                    let receivedHtml = '';
                    let notReceivedCount = 0;
                    let missingCount = 0;
                    let receivedCount = 0;

                    if (currentItems.length === 0) {
                        notReceivedContainer.innerHTML = '<p>No items found in this shipment.</p>';
                        return;
                    }

                    currentItems.forEach((item, index) => {
                        if(!item) return; 

                        const expectedQty = parseFloat(item.qty) || 0;
                        const unitVal = parseFloat(item.value) || 0;
                        const totalVal = expectedQty * unitVal;
                        
                        // Default to 0 if undefined
                        const receivedQty = item.receivedQty !== undefined ? item.receivedQty : 0;

                        // Create select dropdown options
                        let optionsHtml = '';
                        for (let i = 0; i <= expectedQty; i++) {
                            optionsHtml += `<option value="${i}" ${i === receivedQty ? 'selected' : ''}>${i}</option>`;
                        }

                        // Determine styles
                        let cardStyle = "";
                        let labelText = "";
                        let labelStyle = "";

                        if (receivedQty === 0) {
                            cardStyle = "border-color: #ff3b30; background-color: #fff0f0;";
                            labelText = "Item Not Received:";
                            labelStyle = "color: #ff3b30;";
                        } else if (receivedQty < expectedQty) {
                            const missing = expectedQty - receivedQty;
                            cardStyle = "border-color: #ff9500; background-color: #fff9f0;";
                            labelText = `${missing} missing:`;
                            labelStyle = "color: #ff9500;";
                        } else {
                            cardStyle = "border-color: #28a745; background-color: #e9f7eb;";
                            labelText = "Fully Received:";
                            labelStyle = "color: #28a745;";
                        }

                        const itemHtml = `
                            <div class="item-card" id="item-card-${index}" style="${cardStyle}">
                                <div class="item-header">
                                    <div style="flex-grow: 1; padding-right: 10px;">
                                        <div class="item-title">#${index + 1} - ${item.desc || 'Unknown Item'}</div>
                                        <div class="item-expected">
                                            <strong>BC:</strong> ${item.barcode || '--'} | <strong>Br:</strong> ${item.brand || '--'} <br>
                                            <strong>Note:</strong> ${item.note || '--'} <br>
                                            <strong>Expected Qty:</strong> ${expectedQty}
                                        </div>
                                    </div>
                                    ${item.image ? `<img src="${item.image}" onclick="window.openImageModal('${item.image}')" style="width: 55px; height: 55px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 1px solid #ddd;">` : ''}
                                </div>
                                <div class="item-action">
                                    <label id="item-label-${index}" style="${labelStyle}">${labelText}</label>
                                    <select class="qty-input" data-index="${index}" data-expected="${expectedQty}" onchange="window.handleQtyChange(this, ${index})">
                                        ${optionsHtml}
                                    </select>
                                </div>
                            </div>
                        `;

                        // Group them
                        if (receivedQty === 0) {
                            notReceivedHtml += itemHtml;
                            notReceivedCount++;
                        } else if (receivedQty < expectedQty) {
                            missingHtml += itemHtml;
                            missingCount++;
                        } else {
                            receivedHtml += itemHtml;
                            receivedCount++;
                        }
                    });

                    if (notReceivedCount > 0) {
                        notReceivedContainer.innerHTML = `<div class="category-header header-red">Not Received (${notReceivedCount})</div>` + notReceivedHtml;
                    }
                    if (missingCount > 0) {
                        missingContainer.innerHTML = `<div class="category-header header-orange">Partially Received (${missingCount})</div>` + missingHtml;
                    }
                    if (receivedCount > 0) {
                        receivedContainer.innerHTML = `<div class="category-header header-green">Fully Received (${receivedCount})</div>` + receivedHtml;
                    }
                }

                // --- 3. MARK ALL AS RECEIVED ---
                document.getElementById('btn-receive-all').addEventListener('click', () => {
                    currentItems.forEach(item => {
                        if (item) {
                            item.receivedQty = parseFloat(item.qty) || 0;
                        }
                    });
                    renderItems(); // Re-render to move all to Fully Received
                });

                // --- 4. SUBMIT TO FIREBASE ---
                document.getElementById('btn-submit-receipt').addEventListener('click', async () => {
                    const submitBtn = document.getElementById('btn-submit-receipt');
                    submitBtn.textContent = "Updating System...";
                    submitBtn.disabled = true;

                    // Build the update object for Firebase
                    const updates = {};
                    let allFullyReceived = true;

                    currentItems.forEach((item, index) => {
                        if (!item) return;
                        const received = item.receivedQty !== undefined ? parseFloat(item.receivedQty) : 0;
                        const expected = parseFloat(item.qty) || 0;

                        updates[`items/${index}/receivedQty`] = received;

                        if (received < expected) {
                            allFullyReceived = false;
                        }
                    });

                    // Update the overall shipment status based on receiving completeness
                    if (allFullyReceived) {
                        updates['deliveryStatus'] = 'Delivered';
                    } else {
                        updates['deliveryStatus'] = 'Pending';
                    }

                    try {
                        const shipmentRef = window.dbRef(db, 'shipments/' + currentShipmentId);
                        await window.dbUpdate(shipmentRef, updates);
                        
                        alert("Thank you! Your receipt has been logged successfully.");
                        // Return to list view
                        submitBtn.textContent = "Submit Receiving Report";
                        submitBtn.disabled = false;
                        document.getElementById('shipment-details').style.display = "none";
                        document.getElementById('invoice-list-section').style.display = "block";
                        loadAllInvoices();
                    } catch (error) {
                        console.error("Error updating receipt: ", error);
                        alert("Failed to save. Please try again.");
                        submitBtn.textContent = "Submit Receiving Report";
                        submitBtn.disabled = false;
                    }
                });

            }, 500); // Give Firebase scripts a half-second to load
        });
    </script>
</body>
</html>
